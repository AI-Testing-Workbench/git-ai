# Logstash 配置 - 多源遥测数据收集
# 包含：TSCode 遥测 + Git AI Metrics

input {
  # ========================================
  # 输入源 1: TSCode 遥测（1DS OneCollector 协议）
  # ========================================
  http {
    port => 8080
    codec => plain
    type => "tscode_telemetry_http"

    response_headers => {
      "Content-Type" => "application/json"
      "Access-Control-Allow-Origin" => "*"
      "Access-Control-Allow-Methods" => "POST, GET, OPTIONS"
      "Access-Control-Allow-Headers" => "Content-Type"
    }

    threads => 4
    max_content_length => 10485760
    tags => ["telemetry", "1ds", "raw"]
  }

  # ========================================
  # 输入源 2: Git AI Metrics
  # ========================================
  http {
    port => 8082
    codec => json
    type => "git_ai_metrics"

    response_headers => {
      "Content-Type" => "application/json"
    }

    threads => 2
    max_content_length => 5242880
    tags => ["git-ai", "metrics"]
  }

  # ========================================
  # 输入源 3: 健康检查端点
  # ========================================
  http {
    port => 8081
    type => "health_check"
    codec => plain
    threads => 1
  }
}

filter {
  # ========================================
  # 过滤器 1: 处理健康检查请求
  # ========================================
  if [type] == "health_check" {
    drop { }
  }

  # ========================================
  # 过滤器 2: TSCode - 拆分 NDJSON 批量数据
  # ========================================
  if [type] == "tscode_telemetry_http" {
    ruby {
      code => '
        message = event.get("[event][original]") || event.get("message") || ""
        if message.empty?
          event.tag("_no_data_to_split")
        else
          lines = message.split(/\r?\n/).reject(&:empty?)
          event.set("ndjson_lines", lines)
          event.set("ndjson_count", lines.length)
        end
      '
    }

    if [ndjson_count] == 1 {
      json {
        source => "[ndjson_lines][0]"
        remove_field => ["ndjson_lines", "ndjson_count"]
      }
    }

    if [ndjson_count] and [ndjson_count] > 1 {
      split {
        field => "ndjson_lines"
      }

      json {
        source => "ndjson_lines"
        remove_field => ["ndjson_lines", "ndjson_count"]
      }
    }

    # 只移除 HTTP 元数据，保留所有业务数据
    mutate {
      remove_field => [
        "event",
        "message",
        "host",
        "url",
        "user_agent",
        "http"
      ]
    }
  }

  # ========================================
  # 过滤器 3: Git AI Metrics - 解析和展开
  # ========================================
  if [type] == "git_ai_metrics" {
    # 检查是否是 metrics upload 请求
    if [headers][request_path] == "/worker/metrics/upload" or [v] {
      
      # 提取 API 版本
      if [v] {
        mutate {
          add_field => { "api_version" => "%{[v]}" }
        }
      }
      
      # 展开 events 数组 - 必须在提取字段之前进行
      if [events] and [events][0] {
        split {
          field => "events"
        }
        
        # 提取事件基本信息
        mutate {
          add_field => {
            "event_timestamp" => "%{[events][t]}"
            "event_id" => "%{[events][e]}"
          }
        }
        
        # 根据 event_id 添加事件类型
        if [event_id] == "1" {
          mutate { add_field => { "event_type" => "committed" } }
        } else if [event_id] == "2" {
          mutate { add_field => { "event_type" => "agent_usage" } }
        } else if [event_id] == "3" {
          mutate { add_field => { "event_type" => "install_hooks" } }
        } else if [event_id] == "4" {
          mutate { add_field => { "event_type" => "checkpoint" } }
        }
        
        # 提取通用 attributes
        if [events][a][0] {
          mutate { add_field => { "git_ai_version" => "%{[events][a][0]}" } }
        }
        if [events][a][1] {
          mutate { add_field => { "repo_url" => "%{[events][a][1]}" } }
        }
        if [events][a][2] {
          mutate { add_field => { "author" => "%{[events][a][2]}" } }
        }
        if [events][a][3] {
          mutate { add_field => { "commit_sha" => "%{[events][a][3]}" } }
        }
        if [events][a][5] {
          mutate { add_field => { "branch" => "%{[events][a][5]}" } }
        }
        if [events][a][20] {
          mutate { add_field => { "tool" => "%{[events][a][20]}" } }
        }
        if [events][a][21] {
          mutate { add_field => { "model" => "%{[events][a][21]}" } }
        }
        if [events][a][22] {
          mutate { add_field => { "prompt_id" => "%{[events][a][22]}" } }
        }
        
        # 提取 Committed 事件的值
        if [event_type] == "committed" and [events][v] {
          if [events][v][0] {
            mutate { add_field => { "human_additions" => "%{[events][v][0]}" } }
          }
          if [events][v][1] {
            mutate { add_field => { "git_diff_deleted_lines" => "%{[events][v][1]}" } }
          }
          if [events][v][2] {
            mutate { add_field => { "git_diff_added_lines" => "%{[events][v][2]}" } }
          }
          if [events][v][11] {
            mutate { add_field => { "commit_subject" => "%{[events][v][11]}" } }
          }
        }
        
        # 提取 Checkpoint 事件的值
        if [event_type] == "checkpoint" and [events][v] {
          if [events][v][0] {
            mutate { add_field => { "checkpoint_ts" => "%{[events][v][0]}" } }
          }
          if [events][v][1] {
            mutate { add_field => { "checkpoint_kind" => "%{[events][v][1]}" } }
          }
          if [events][v][2] {
            mutate { add_field => { "file_path" => "%{[events][v][2]}" } }
          }
          if [events][v][3] {
            mutate { add_field => { "lines_added" => "%{[events][v][3]}" } }
          }
          if [events][v][4] {
            mutate { add_field => { "lines_deleted" => "%{[events][v][4]}" } }
          }
        }
        
        # 提取 InstallHooks 事件的值
        if [event_type] == "install_hooks" and [events][v] {
          if [events][v][0] {
            mutate { add_field => { "tool_id" => "%{[events][v][0]}" } }
          }
          if [events][v][1] {
            mutate { add_field => { "install_status" => "%{[events][v][1]}" } }
          }
        }
        
        # 转换时间戳
        if [event_timestamp] {
          date {
            match => [ "event_timestamp", "UNIX" ]
            target => "@timestamp"
          }
        }
      }
      
      # 清理不需要的字段（保留 event.original 用于调试）
      mutate {
        remove_field => [ "headers", "host", "url", "http", "v", "events" ]
      }
    }
  }
}

output {
  # ========================================
  # 输出 1: TSCode 遥测 -> Elasticsearch
  # ========================================
  if [type] == "tscode_telemetry_http" {
    elasticsearch {
      hosts => ["${ES_HOSTS}"]
      user => "${ES_USER}"
      password => "${ES_PASSWORD}"
      manage_template => false
      index => "tscode-telemetry-raw-%{+YYYY.MM.dd}"
    }
  }

  # ========================================
  # 输出 2: Git AI Metrics -> Elasticsearch
  # ========================================
  if [type] == "git_ai_metrics" {
    elasticsearch {
      hosts => ["${ES_HOSTS}"]
      user => "${ES_USER}"
      password => "${ES_PASSWORD}"
      manage_template => false
      index => "git-ai-metrics-%{+YYYY.MM.dd}"
    }
  }

  # ========================================
  # 调试输出（可选，取消注释以启用）
  # ========================================
  # if [type] == "git_ai_metrics" {
  #   stdout {
  #     codec => rubydebug {
  #       metadata => true
  #     }
  #   }
  # }
}
